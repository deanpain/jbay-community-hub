name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Single pnpm version: root package.json "packageManager" (pnpm/action-setup reads it when `version` is omitted).
# JS actions on Node 24 per https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Workspace tests
        run: pnpm test

      - name: Contract tests (Compact)
        run: pnpm contracts:test

      - name: Secret scanning (trufflehog)
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin v3.88.0
          trufflehog filesystem --no-verification --fail --root .

  mobile-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mobile TypeScript check
        run: pnpm --filter mobile exec tsc --noEmit

      - name: Expo export (web smoke)
        run: pnpm --filter mobile exec expo export --platform web --output-dir dist-web
        env:
          CI: "1"
